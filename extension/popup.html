<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      padding: 20px;
    }
    .logo {
      font-size: 18px; font-weight: 800;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .tagline { font-size: 11px; color: #4b5563; margin-bottom: 18px; }

    .status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 10px;
      background: #1a1a24; border: 1px solid #2a2a38;
      font-size: 12px; color: #6b7280;
      margin-bottom: 10px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4b5563; }
    .status-dot.active { background: #6ee7b7; }
    #status-text { color: #9ca3af; }

    .btn {
      display: block; width: 100%;
      padding: 10px; border-radius: 100px;
      border: 1.5px solid #2a2a38;
      background: #1a1a24; color: #9ca3af;
      font-size: 12px; font-weight: 500;
      cursor: pointer; text-align: center;
      transition: all 0.15s;
      margin-bottom: 8px;
    }
    .btn:hover { border-color: #3b82f6; color: #93c5fd; }
    .btn.primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-color: transparent; color: #fff; font-weight: 600;
    }
    .btn.primary:hover { opacity: 0.88; }

    .footer { font-size: 10px; color: #374151; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="logo">SmartSpend</div>
  <div class="tagline">AI purchase advisor</div>

  <div class="status-row">
    <div class="status-dot" id="profile-dot"></div>
    <span id="status-text">Checking profile…</span>
  </div>

  <button class="btn primary" id="setup-btn">⚙ Edit Profile</button>
  <button class="btn" id="help-btn">How it works</button>

  <div class="footer">Works on any checkout page</div>

  <script src="popup.js"></script>
</body>
</html>
