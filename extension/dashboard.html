<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartSpend — Dashboard</title>
  <link rel="stylesheet" href="components.css" />
  <script src="theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ss-bg);
      color: var(--ss-text);
      min-height: 100vh;
      padding: 36px 16px 60px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .logo {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .header-sub {
      font-size: 13px;
      color: var(--ss-text-3);
      margin-top: 2px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-settings {
      padding: 8px 16px;
      border-radius: 100px;
      border: 1.5px solid var(--ss-border);
      background: var(--ss-bg-card);
      color: var(--ss-text-2);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-settings:hover { border-color: var(--ss-blue); color: var(--ss-blue-light); }

    /* Section header */
    .section-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ss-text-3);
      margin-bottom: 12px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    /* Budget section */
    .budget-card {
      background: var(--ss-bg-card);
      border: 1px solid var(--ss-border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .budget-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .budget-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ss-text-field);
    }
    .budget-amounts {
      font-size: 12px;
      color: var(--ss-text-3);
    }
    .budget-amounts span {
      color: var(--ss-text-2);
      font-weight: 600;
    }

    /* Category breakdown */
    .section-card {
      background: var(--ss-bg-card);
      border: 1px solid var(--ss-border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    /* History list */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--ss-border);
    }
    .history-item:last-child { border-bottom: none; }
    .history-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--ss-bg);
      border: 1px solid var(--ss-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--ss-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-meta {
      font-size: 11px;
      color: var(--ss-text-4);
      margin-top: 2px;
    }
    .history-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .history-price {
      font-size: 13px;
      font-weight: 600;
      color: var(--ss-text-2);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--ss-text-4);
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-title { font-size: 14px; font-weight: 500; color: var(--ss-text-3); margin-bottom: 6px; }
    .empty-sub { font-size: 12px; line-height: 1.5; }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 32px;
      color: var(--ss-text-4);
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
    @media (max-width: 360px) {
      body { padding: 20px 12px 40px; }
    }
  </style>
</head>
<body>
<div id="ss-app" class="container dark-mode">

  <div class="header">
    <div>
      <div class="logo">SmartSpend</div>
      <div class="header-sub">Your spending insights</div>
    </div>
    <div class="header-actions">
      <button class="btn-settings" id="settings-btn">⚙ Edit Profile</button>
      <button class="theme-toggle" id="theme-toggle">☀️</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="section-header">This month</div>
  <div class="stats-grid" id="stats-grid">
    <div class="ss-stat-card">
      <div class="ss-stat-label">Analyzed</div>
      <div class="ss-stat-value" id="stat-total">—</div>
      <div class="ss-stat-sub">items</div>
    </div>
    <div class="ss-stat-card">
      <div class="ss-stat-label">Buy</div>
      <div class="ss-stat-value" id="stat-buy" style="color:var(--ss-green)">—</div>
      <div class="ss-stat-sub">decisions</div>
    </div>
    <div class="ss-stat-card">
      <div class="ss-stat-label">Wait</div>
      <div class="ss-stat-value" id="stat-wait" style="color:var(--ss-amber)">—</div>
      <div class="ss-stat-sub">decisions</div>
    </div>
    <div class="ss-stat-card">
      <div class="ss-stat-label">Avoid</div>
      <div class="ss-stat-value" id="stat-avoid" style="color:var(--ss-red)">—</div>
      <div class="ss-stat-sub">decisions</div>
    </div>
  </div>

  <!-- Budget progress -->
  <div class="budget-card" id="budget-card" style="display:none;">
    <div class="budget-header">
      <span class="budget-title">Monthly Budget</span>
      <span class="budget-amounts" id="budget-amounts"></span>
    </div>
    <div class="ss-progress-track">
      <div class="ss-progress-fill" id="budget-fill" style="width:0%"></div>
    </div>
    <div class="ss-help" style="margin-top:8px;" id="budget-hint"></div>
  </div>

  <!-- Category breakdown -->
  <div class="section-card" id="cat-card">
    <div class="section-header" style="margin-bottom:14px;">Top categories</div>
    <div id="cat-list">
      <div class="loading-state"><span class="ss-spinner"></span></div>
    </div>
  </div>

  <!-- Purchase history -->
  <div class="section-card">
    <div class="section-header" style="margin-bottom:14px;">Recent purchases</div>
    <div id="history-list">
      <div class="loading-state"><span class="ss-spinner"></span></div>
    </div>
  </div>

</div>
<script src="dashboard.js"></script>

</body>
</html>
